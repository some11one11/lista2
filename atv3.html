<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atividade JavaScript • Dark Mode</title>

  <style>
    :root {
      --bg:        #0d1117;
      --bg-card:    #161b22;
      --text:       #e2e8f0;
      --text-soft:  #94a3b8;
      --primary:    #7c3aed;
      --primary-d:  #5b21b6;
      --accent:     #22d3ee;
      --border:     #30363d;
      --shadow:     0 10px 30px -12px rgba(0,0,0,0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow);
    }

    header {
      text-align: center;
      margin-bottom: 2.2rem;
    }

    h1 {
      font-size: 2.1rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-soft);
      font-size: 1.05rem;
      opacity: 0.9;
    }

    .exercise-area {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    label {
      font-weight: 600;
      color: var(--accent);
      font-size: 1.1rem;
      margin-bottom: 0.4rem;
      display: block;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      background: #0b0e14;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 1rem;
      resize: vertical;
      min-height: 110px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s;
      font-size: 0.98rem;
    }

    button:hover {
      background: var(--primary-d);
      transform: translateY(-1px);
    }

    button.clear {
      background: #374151;
    }

    button.clear:hover {
      background: #4b5563;
    }

    #resultado {
      background: #0b0e14;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 120px;
      font-family: 'Consolas', monospace;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 0.98rem;
      line-height: 1.5;
      margin-top: 1.2rem;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      color: var(--text-soft);
      font-size: 0.85rem;
      opacity: 0.8;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.8rem 1.4rem;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <h1>Cálculo do valor total de uma compra</h1>
    </header>

    <div class="exercise-area">

  
      <label for="entrada"Cálculo do valor total de uma compra</label>
      <textarea id="entrada" placeholder="Escreva aqui seu texto"></textarea>

      <div class="controls">
        <button id="btnExecutar">Executar / Verificar</button>
        <button class="clear" id="btnLimpar">Limpar tudo</button>
      </div>

      <div id="resultado">
    
        input
      </div>

    </div>

    <footer>
      Feito por Somelle, Taylor, Diego • 2026
    </footer>

  </div>


</body>
</html>
